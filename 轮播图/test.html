<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
        }

        .container {
            width: 600px;
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: palegreen;
        }

        .box1 {
            width: 100%;
            height: 200px;
            background-color: pink;
            margin-right: 200px;
        }

        .box2 {
            width: 300px;
            padding: 0 50px;
            height: 200px;
            background-color: paleturquoise;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box1"></div>
        <div class="box2"></div>
    </div>
</body>
</html>
