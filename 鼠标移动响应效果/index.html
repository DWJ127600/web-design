<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鼠标移动响应效果</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            background-image: linear-gradient(to bottom, rgb(86, 71, 117), #000, #000);
        }

        .shell {
            height: 100%;
            position: relative;
        }

        .shell h2 {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 99;
            color: rgba(255, 255, 255, 0.9);
            font: 600 100px '优设标题黑';
        }

        .image {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .image div {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
        }

        .img1 {
            background-image: url(./image/1.png);
        }

        .img2 {
            background-image: url(./image/2.png);
        }

        .img3 {
            background-image: url(./image/3.png);
        }

        .img4 {
            background-image: url(./image/4.png);
            background-position: 30%;
        }

        .img5 {
            background-image: url(./image/5.png);
        }

        .img6 {
            background-image: url(./image/6.png);
            left: 400px;
            top: 350px;
        }
    </style>
</head>

<body>
    <div class="shell">
        <h2>UNIVERSE</h2>
        <div class="image">
            <div class="img1"></div>
            <div class="img2"></div>
            <div class="img3"></div>
            <div class="img4"></div>
            <div class="img5"></div>
            <div class="img6"></div>
        </div>
    </div>
    <script>
        const img1 = document.querySelector(".img1");
        const img3 = document.querySelector(".img3");
        const img4 = document.querySelector(".img4");
        const img5 = document.querySelector(".img5");
        document.addEventListener("mousemove", e => {
            const mouseX = e.clientX;
            const mouseY = e.clientY;

            const img1x = img1.offsetLeft;
            const img1y = img1.offsetTop;

            const img3x = img3.offsetLeft;
            const img3y = img3.offsetTop;

            const img4x = img4.offsetLeft;
            const img4y = img4.offsetTop;

            const img5x = img5.offsetLeft;
            const img5y = img5.offsetTop;

            const diff1x = (mouseX - img1x) / 45;
            const diff1y = (mouseY - img1y) / 45;

            const diff3x = (mouseX - img3x) / 18;
            const diff3y = (mouseY - img3y) / 18;

            const diff4x = (mouseX - img4x) / 30;
            const diff4y = (mouseY - img4y) / 30;

            const diff5x = (mouseX - img5x) / 8;
            const diff5y = (mouseY - img5y) / 8;

            img1.style.transform = `translate(${diff1x}px,${diff1y}px)`;
            img3.style.transform = `translate(${diff3x}px,${diff3y}px)`;
            img4.style.transform = `translate(${diff4x}px,${diff4y}px)`;
            img5.style.transform = `translate(${diff5x}px,${diff5y}px)`;
        })
    </script>
</body>

</html>
